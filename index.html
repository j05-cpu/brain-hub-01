<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Can You Beat AI?</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES & RESET
   ============================================================ */
:root {
  --bg-deep: #050a18;
  --bg-panel: #0a1628;
  --bg-card: #0f1f3d;
  --bg-card2: #111827;
  --accent-primary: #00f5ff;
  --accent-secondary: #7c3aed;
  --accent-gold: #fbbf24;
  --accent-green: #10b981;
  --accent-red: #ef4444;
  --text-primary: #e2e8f0;
  --text-muted: #64748b;
  --text-bright: #ffffff;
  --border: rgba(0,245,255,0.15);
  --shadow-glow: 0 0 20px rgba(0,245,255,0.2);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.4);

  /* Mode colors */
  --trivia: #f59e0b;
  --math: #3b82f6;
  --memory: #8b5cf6;
  --reaction: #ef4444;
  --word: #10b981;
  --pattern: #ec4899;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   UTILITIES
   ============================================================ */
.hidden { display: none !important; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.text-center { text-align: center; }
.text-accent { color: var(--accent-primary); }
.text-gold { color: var(--accent-gold); }
.text-green { color: var(--accent-green); }
.text-red { color: var(--accent-red); }

/* ============================================================
   HEADER / NAV
   ============================================================ */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(5,10,24,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 0;
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--accent-primary);
  text-shadow: 0 0 20px rgba(0,245,255,0.5);
  cursor: pointer;
  letter-spacing: 2px;
}

.logo span { color: var(--accent-secondary); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.xp-bar-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.level-badge {
  background: linear-gradient(135deg, var(--accent-secondary), #4f46e5);
  color: white;
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

.xp-track {
  width: 120px;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}

.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}

.xp-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  white-space: nowrap;
}

#profile-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Exo 2', sans-serif;
  font-size: 0.85rem;
  transition: all 0.2s;
}
#profile-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

/* ============================================================
   STATS ROW
   ============================================================ */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 24px 0;
  position: relative;
  z-index: 1;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}

.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
}

.stat-icon { font-size: 1.5rem; margin-bottom: 6px; }
.stat-value {
  font-family: 'Orbitron', monospace;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent-primary);
}
.stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

/* ============================================================
   SECTION TITLE
   ============================================================ */
.section-title {
  text-align: center;
  padding: 10px 0 30px;
  position: relative;
  z-index: 1;
}

.section-title h2 {
  font-family: 'Orbitron', monospace;
  font-size: 2rem;
  font-weight: 900;
  color: var(--text-bright);
  text-shadow: 0 0 30px rgba(0,245,255,0.3);
  margin-bottom: 10px;
}

.section-title p { color: var(--text-muted); font-size: 1rem; }

/* ============================================================
   GAME MODE CARDS GRID
   ============================================================ */
.modes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding-bottom: 40px;
  position: relative;
  z-index: 1;
}

.mode-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}

.mode-card:hover {
  transform: translateY(-4px);
  border-color: var(--mode-color, var(--accent-primary));
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px var(--mode-color, var(--accent-primary));
}

.mode-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at top left, rgba(var(--mode-rgb, 0,245,255), 0.08), transparent 60%);
  pointer-events: none;
}

.mode-icon {
  font-size: 2.5rem;
  margin-bottom: 12px;
  display: block;
}

.mode-title {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 8px;
}

.mode-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 14px; }

.mode-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.meta-tag {
  font-size: 0.7rem;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.difficulty-tag { color: var(--mode-color, var(--accent-primary)); border-color: var(--mode-color, var(--accent-primary)); }
.rounds-tag { color: var(--text-muted); border-color: rgba(255,255,255,0.1); }

.mode-start-btn {
  margin-top: 16px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: var(--mode-color, var(--accent-primary));
  color: #000;
  font-family: 'Orbitron', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.mode-start-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

/* ============================================================
   GAME SECTION (shared)
   ============================================================ */
.game-section {
  position: relative;
  z-index: 1;
  padding-bottom: 40px;
}

game-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.back-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Exo 2', sans-serif;
  transition: all 0.2s;
}
.back-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

.game-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}

.game-title-row h2 {
  font-family: 'Orbitron', monospace;
  font-size: 1.4rem;
  font-weight: 700;
}

.game-status-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.status-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}

.status-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.status-value { font-family: 'Orbitron', monospace; font-size: 1.1rem; color: var(--accent-primary); margin-top: 4px; }

/* AI vs Player panels */
.vs-layout {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: start;
  margin-bottom: 24px;
}

.vs-divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top: 20px;
}

.vs-text {
  font-family: 'Orbitron', monospace;
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--accent-red);
  text-shadow: 0 0 15px rgba(239,68,68,0.5);
}

.player-panel, .ai-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
}

.ai-panel { border-color: rgba(124,58,237,0.3); }

.panel-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.panel-name {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-bright);
}

.panel-score {
  font-family: 'Orbitron', monospace;
  font-size: 2rem;
  font-weight: 900;
  color: var(--accent-primary);
  margin-top: 8px;
}

.ai-panel .panel-score { color: var(--accent-secondary); }

/* AI thinking animation */
.ai-thinking {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
}

.ai-dot {
  width: 6px; height: 6px;
  background: var(--accent-secondary);
  border-radius: 50%;
  animation: pulse-dot 1.4s ease-in-out infinite;
}
.ai-dot:nth-child(2) { animation-delay: 0.2s; }
.ai-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse-dot {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.ai-status-text { font-size: 0.75rem; color: var(--accent-secondary); margin-left: 4px; }

/* ============================================================
   QUESTION / ANSWER AREA (Trivia, Math, Word, Pattern)
   ============================================================ */
.question-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  margin-bottom: 20px;
  text-align: center;
}

.question-category {
  font-size: 0.75rem;
  color: var(--accent-primary);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.question-text {
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text-bright);
  line-height: 1.5;
}

.question-hint {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 10px;
  font-style: italic;
}

/* Timer ring */
.timer-ring-wrap {
  display: flex;
  justify-content: center;
  margin: 20px 0 10px;
}

.timer-ring {
  width: 80px; height: 80px;
  position: relative;
}

.timer-ring svg { transform: rotate(-90deg); }

.timer-ring circle {
  fill: none;
  stroke-width: 6;
}

.timer-ring .bg { stroke: rgba(255,255,255,0.1); }
.timer-ring .progress { stroke: var(--accent-primary); stroke-dasharray: 226; stroke-dashoffset: 226; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

.timer-number {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent-primary);
}

/* Answer options */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.option-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  color: var(--text-primary);
  font-family: 'Exo 2', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  line-height: 1.4;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--accent-primary);
  background: rgba(0,245,255,0.05);
  color: var(--accent-primary);
}

.option-btn.correct {
  background: rgba(16,185,129,0.15);
  border-color: var(--accent-green);
  color: var(--accent-green);
  animation: flash-correct 0.3s ease;
}

.option-btn.incorrect {
  background: rgba(239,68,68,0.15);
  border-color: var(--accent-red);
  color: var(--accent-red);
  animation: flash-incorrect 0.3s ease;
}

@keyframes flash-correct {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

@keyframes flash-incorrect {
  0% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
  100% { transform: translateX(0); }
}

/* Text input answers */
.answer-input-row {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}

.answer-input {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  color: var(--text-bright);
  font-family: 'Exo 2', sans-serif;
  font-size: 1.1rem;
  outline: none;
  transition: border-color 0.2s;
}

.answer-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(0,245,255,0.1); }

.submit-btn {
  background: linear-gradient(135deg, var(--accent-primary), #0099cc);
  border: none;
  border-radius: 10px;
  padding: 14px 28px;
  color: #000;
  font-family: 'Orbitron', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.submit-btn:hover { filter: brightness(1.15); transform: scale(1.02); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Feedback message */
.feedback-msg {
  text-align: center;
  padding: 12px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 1rem;
  margin-bottom: 16px;
  transition: all 0.3s;
}
